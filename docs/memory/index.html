      item.date, item.title, item.summary, item.typeLabel, item.action, item.status,
      ...(item.tags || []), ...(item.tickers || []), item.content
    ].join(" ").toLowerCase();
    return haystack.includes(query);
  });
}

function renderFilters() {
  const node = document.getElementById("filters");
  node.innerHTML = typeOrder.map((type) => {
    const count = type === "all" ? payload.items.length : (payload.counts[type] || 0);
    return `<button class="filter ${state.type === type ? "active" : ""}" data-type="${type}">${labels[type]} ${count}</button>`;
  }).join("");
  node.querySelectorAll("button").forEach((button) => {
    button.addEventListener("click", () => {
      state.type = button.dataset.type;
      const items = visibleItems();
      if (!items.some((item) => item.id === state.selectedId)) state.selectedId = items[0] && items[0].id;
      render();
    });
  });
}

function groupByDate(items) {
  const groups = new Map();
  items.forEach((item) => {
    const date = item.date || "未分类";
    if (!groups.has(date)) groups.set(date, []);
    groups.get(date).push(item);
  });
  return Array.from(groups.entries());
}

function renderTimeline() {
  const node = document.getElementById("timeline");
  const items = visibleItems();
  if (!items.length) {
    node.innerHTML = `<div class="empty">没有匹配的记忆记录。</div>`;
    return;
  }
  node.innerHTML = groupByDate(items).map(([date, rows]) => `
    <section class="day">
      <h2>${esc(date)} · ${rows.length} 条</h2>
      ${rows.map((item) => `
        <button class="item ${item.id === state.selectedId ? "active" : ""}" data-id="${esc(item.id)}" data-type="${esc(item.type)}">
          <span class="kind ${esc(item.type)}">${esc(item.typeLabel)}</span>
          ${item.status ? `<span class="kind">${esc(item.status)}</span>` : ""}
          <strong>${esc(item.title)}</strong>
          <small>${esc(item.summary || item.sourcePath || "")}</small>
        </button>`).join("")}
    </section>
  `).join("");
  node.querySelectorAll(".item").forEach((button) => {
    button.addEventListener("click", () => {
      state.selectedId = button.dataset.id;
      history.replaceState(null, "", "#" + encodeURIComponent(state.selectedId));
      render();
    });
  });
}

function renderDetail() {
  const node = document.getElementById("detail");
  const items = visibleItems();
  const item = payload.items.find((row) => row.id === state.selectedId) || items[0];
  if (!item) {
    node.innerHTML = `<div class="empty">还没有可展示的记忆。先追加研究结论或操作建议，再刷新这个页面。</div>`;
    return;
  }
  state.selectedId = item.id;
  const tags = [...(item.tickers || []), ...(item.tags || [])].filter(Boolean);
  node.innerHTML = `
    <div class="detail-header">
      <div>
        <span class="kind ${esc(item.type)}">${esc(item.typeLabel)}</span>
        ${item.action ? `<span class="kind">${esc(item.action)}</span>` : ""}
        <h2>${esc(item.title)}</h2>
        <p class="detail-summary">${esc(item.summary || "暂无摘要。")}</p>
        <div class="chips">
          <span class="chip">${esc(item.date || "未分类日期")}</span>
          ${tags.map((tag) => `<span class="chip">${esc(tag)}</span>`).join("")}
        </div>
      </div>
      <div class="source">
        <div>${esc(item.sourcePath || "")}</div>
        ${item.sourceHref ? `<a href="${esc(item.sourceHref)}" target="_blank" rel="noreferrer">打开原文</a>` : ""}
      </div>
    </div>
    <pre class="markdown">${esc(item.content || "")}</pre>
  `;
}

function renderStats() {
  const counts = payload.counts || {};
  document.getElementById("countSummary").textContent =
    `大研究 ${counts.research || 0} / 操作建议 ${counts.decision || 0} / 周复盘 ${counts.weekly_review || 0} / 系统报告 ${counts.system_report || 0}`;
}

function render() {
  renderStats();
  renderFilters();
  renderTimeline();
  renderDetail();
}

document.getElementById("searchInput").addEventListener("input", (event) => {
  state.query = event.target.value;
  const items = visibleItems();
  if (!items.some((item) => item.id === state.selectedId)) state.selectedId = items[0] && items[0].id;
  renderTimeline();
  renderDetail();
});

render();
</script>
</body>
</html>
